# --- Upstream forks: repos we use but don't own ---
# upstream_remote: the remote name pointing to the source-of-truth upstream

[repos.freshell]
role = "dependency"
path = "../freshell"
url = "https://github.com/danshapiro/freshell"
upstream_remote = "origin"
upstream_branch = "main"
tags = ["dependency", "upstream-fork", "terminal"]
lifecycle = "active"
daemon_posture = "always-on"
notes = "Dan Shapiro's browser terminal. We run it at port 3550. Track upstream for upgrades."

[repos.workgraph]
role = "dependency"
path = "../workgraph"
url = "https://github.com/graphwork/workgraph"
upstream_remote = "origin"
upstream_branch = "main"
tags = ["dependency", "upstream-fork", "speedrift"]
lifecycle = "active"
daemon_posture = "always-on"
notes = "Task graph spine. We have a fork at dbmcco/workgraph. upstream=graphwork/workgraph."

[repos.agency]
role = "dependency"
path = "~/.local/pipx/venvs/agency-engine"
url = "https://github.com/agentbureau/agency"
upstream_remote = "origin"
upstream_branch = "main"
tags = ["dependency", "upstream-fork", "execution-layer", "agent-composition"]
lifecycle = "active"
daemon_posture = "always-on"
service_port = 8000
notes = "Agent identity and role composition engine. Installed via pipx as agency-engine. Always-on launchd service on port 8000. Pairs with workgraph as execution layer (wg=task spine, agency=who executes). Embedding: Ollama qwen3-embedding:8b (4096 dims) — no separate embedding service needed."
